<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing Viral</title>
    <link rel="icon" href="img/flowers.png" type="image/x-icon" />
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-71L9W1CT7X"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-71L9W1CT7X");
    </script>
    <style>
      /* Contenedor general */
      body {
        background: #000;
        margin: 0;
        padding: 0;
      }
      h2 {
        color: #f4f4f4;
      }
      .wizard-container {
        max-width: 450px;
        margin: auto;
        text-align: center;
        font-family: sans-serif;
        padding: 20px;
      }

      /* Tarjetas ocasiones y copies */
      .occasion,
      .copy-card {
        padding: 14px 20px;
        border-radius: 12px;
        border: none;
        background: #f4f4f4;
        cursor: pointer;
        margin: 6px;
        font-size: 16px;
        transition: 0.2s;
      }

      .occasion:hover,
      .copy-card:hover {
        background: #ffe4ec;
      }

      .occasion.selected,
      .copy-card.selected {
        background: #ffd6e7;
        border: 1px solid #ff4d8d;
      }

      /* Inputs y textarea */
      textarea,
      input {
        width: 80%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #ddd;
        font-size: 16px;
      }

      /* Previsualización mensaje */
      .preview {
        margin-top: 10px;
        padding: 12px;
        border: 1px dashed #aaa;
        border-radius: 8px;
        background: #fff0f6;
        font-weight: bold;
      }

      /* Botones wizard */
      #nextStep,
      #prevStep {
        padding: 10px 20px;
        border-radius: 10px;
        background: #ff4d8d;
        color: white;
        border: none;
        cursor: pointer;
        font-size: 16px;
        margin-top: 10px;
      }
      #nextStep:hover,
      #prevStep:hover,
      #shareBtn:hover {
        background: #ff2d6d;
      }
      #prevStep {
        margin-right: 10px;
      }

      /* Botones compartir */
      #shareWhatsApp,
      #shareCopy,
      #shareBtn {
        padding: 10px 16px;
        border-radius: 8px;
        margin: 8px;
        border: none;
        cursor: pointer;
        font-size: 16px;
      }
      #shareWhatsApp {
        background: #25d366;
        color: white;
      }
      #shareBtn {
        background: #ff4d8d;
        color: white;
      }
      #shareCopy {
        background: #888;
        color: white;
      }
      #shareWhatsApp:hover {
        background: #1ebe57;
      }
      #shareCopy:hover {
        background: #666;
      }

      .step {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="wizard-container">
      <!-- Paso 1: Elegir ocasión -->
      <div class="step" id="step-occasion">
        <h2>1️⃣ Elige la ocasión y click en siguiente</h2>
        <div class="occasion-container">
          <button class="occasion" data-type="amor">❤️ Amor</button>
          <button class="occasion" data-type="amistad">🤝 Amistad</button>
          <button class="occasion" data-type="carino">💛 Cariño</button>
          <button class="occasion" data-type="agradecer">🙏 Agradecer</button>
          <button class="occasion" data-type="porque">✨ Porque sí</button>
          <button class="occasion" data-type="personalizado">
            🖊️ Mensaje personalizado
          </button>
        </div>
      </div>

      <!-- Paso 2: Elegir mensaje -->
      <div class="step" id="step-message" style="display: none">
        <h2>2️⃣ Elige o escribe tu mensaje y click en siguiente</h2>
        <div id="copyContainer"></div>
        <textarea
          id="customMessage"
          placeholder="Escribe tu mensaje (máx 135 caracteres)"
          maxlength="135"
          style="display: none"
        ></textarea>
        <div id="previewMessage" class="preview"></div>
      </div>

      <!-- Paso 3: Nombre destinatario -->
      <div class="step" id="step-name" style="display: none">
        <h2>3️⃣ Nombre de la persona especial</h2>
        <input id="nameInput" placeholder="Ej. María" />
      </div>

      <!-- Paso 4: Nombre remitente -->
      <div class="step" id="step-sender" style="display: none">
        <h2>
          4️⃣ Tu nombre <span>*Deja vacio si quieres que sea anonimo</span>
        </h2>
        <input id="senderInput" placeholder="Ej. Juan" />
      </div>

      <!-- Paso 5: Generar link -->
      <div class="step" id="step-generate" style="display: none">
        <h2>5️⃣ Comparte tu mensaje</h2>
        <div id="result"></div>
        <button id="shareBtn" style="display: flex; margin: 8px auto">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            style="width: 15px; margin-right: 5px"
          >
            <path
              fill="currentColor"
              d="M17 22q-1.25 0-2.125-.875T14 19q0-.15.075-.7L7.05 14.2q-.4.375-.925.588T5 15q-1.25 0-2.125-.875T2 12t.875-2.125T5 9q.6 0 1.125.213t.925.587l7.025-4.1q-.05-.175-.062-.337T14 5q0-1.25.875-2.125T17 2t2.125.875T20 5t-.875 2.125T17 8q-.6 0-1.125-.213T14.95 7.2l-7.025 4.1q.05.175.063.338T8 12t-.012.363t-.063.337l7.025 4.1q.4-.375.925-.587T17 16q1.25 0 2.125.875T20 19t-.875 2.125T17 22"
            /></svg
          ><span>Compartir link</span>
        </button>
        <button id="shareWhatsApp" style="display: flex; margin: 8px auto">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            style="width: 15px; margin-right: 5px"
          >
            <path
              fill="currentColor"
              d="M17 22q-1.25 0-2.125-.875T14 19q0-.15.075-.7L7.05 14.2q-.4.375-.925.588T5 15q-1.25 0-2.125-.875T2 12t.875-2.125T5 9q.6 0 1.125.213t.925.587l7.025-4.1q-.05-.175-.062-.337T14 5q0-1.25.875-2.125T17 2t2.125.875T20 5t-.875 2.125T17 8q-.6 0-1.125-.213T14.95 7.2l-7.025 4.1q.05.175.063.338T8 12t-.012.363t-.063.337l7.025 4.1q.4-.375.925-.587T17 16q1.25 0 2.125.875T20 19t-.875 2.12 five"
            ></path>
          </svg>
          <span>WhatsApp</span>
        </button>
        <button id="shareCopy" style="display: flex; margin: 8px auto">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            style="width: 15px; margin-right: 5px"
            viewBox="0 0 24 24"
          >
            <path
              fill="none"
              stroke="currentColor"
              strokeLinecap="round"
              strokeLinejoin="round"
              strokeWidth="1.5"
              d="M20.829 12.861c.171-.413.171-.938.171-1.986s0-1.573-.171-1.986a2.25 2.25 0 0 0-1.218-1.218c-.413-.171-.938-.171-1.986-.171H11.1c-1.26 0-1.89 0-2.371.245a2.25 2.25 0 0 0-.984.984C7.5 9.209 7.5 9.839 7.5 11.1v6.525c0 1.048 0 1.573.171 1.986c.229.551.667.99 1.218 1.218c.413.171.938.171 1.986.171s1.573 0 1.986-.171m7.968-7.968a2.25 2.25 0 0 1-1.218 1.218c-.413.171-.938.171-1.986.171s-1.573 0-1.986.171a2.25 2.25 0 0 0-1.218 1.218c-.171.413-.171.938-.171 1.986s0 1.573-.171 1.986a2.25 2.25 0 0 1-1.218 1.218m7.968-7.968a11.68 11.68 0 0 1-7.75 7.9l-.218.068M16.5 7.5v-.9c0-1.26 0-1.89-.245-2.371a2.25 2.25 0 0 0-.983-.984C14.79 3 14.16 3 12.9 3H6.6c-1.26 0-1.89 0-2.371.245a2.25 2.25 0 0 0-.984.984C3 4.709 3 5.339 3 6.6v6.3c0 1.26 0 1.89.245 2.371c.216.424.56.768.984.984c.48.245 1.111.245 2.372.245H7.5"
            />
          </svg>
          <span>Copiar link</span>
        </button>
      </div>

      <!-- Botones navegación -->
      <div style="margin-top: 15px">
        <button id="prevStep">⬅️ Atrás</button>
        <button id="nextStep">Siguiente ➡️</button>
      </div>
    </div>

    <script src="js/share.js"></script>
  </body>
</html>
